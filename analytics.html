<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — AXION</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        /* Analytics Page Specific Styles */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .analytics-charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--spacing-lg);
        }
        
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
        }
        
        .chart-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .chart-card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .chart-container {
            position: relative;
            width: 100%;
        }
        
        .chart-container canvas {
            width: 100% !important;
            height: auto !important;
        }
        
        .donut-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .donut-legend {
            display: flex;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-md);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
        }
        
        .legend-dot.completed {
            background: var(--gradient-cyan);
        }
        
        .legend-dot.pending {
            background: var(--gradient-orange);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .analytics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .analytics-charts {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">AXION</a>
            <button class="collapse-btn" aria-label="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="tasks.html" class="nav-item">
                <i class="fas fa-check-square"></i>
                <span>Tasks</span>
            </a>
            <a href="calendar.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendar</span>
            </a>
            <a href="pomodoro.html" class="nav-item">
                <i class="fas fa-clock"></i>
                <span>Pomodoro</span>
            </a>
            <a href="analytics.html" class="nav-item active">
                <i class="fas fa-chart-bar"></i>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar">DU</div>
                <div class="user-info">
                    <div class="user-name">Demo User</div>
                    <div class="user-email">demo@axion.app</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">Analytics</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="logoutBtn" aria-label="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Analytics Content -->
        <div class="dashboard-content">
            <!-- Stats Grid -->
            <div class="analytics-grid">
                <div class="stat-card analytics-total">
                    <div class="stat-icon purple">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card analytics-completed">
                    <div class="stat-icon cyan">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card analytics-pending">
                    <div class="stat-icon orange">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card analytics-rate">
                    <div class="stat-icon pink">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    </div>
                    <div class="stat-value">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="analytics-charts">
                <!-- Tasks Per Day -->
                <div class="chart-card">
                    <div class="chart-card-header">
                        <h3 class="chart-card-title">Tasks Created (Last 7 Days)</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="tasksPerDayChart" width="400" height="200"></canvas>
                    </div>
                </div>

                <!-- Completed vs Pending -->
                <div class="chart-card donut-container">
                    <div class="chart-card-header">
                        <h3 class="chart-card-title">Completion Status</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="donutChart" width="200" height="200"></canvas>
                    </div>
                    <div class="donut-legend">
                        <div class="legend-item">
                            <span class="legend-dot completed"></span>
                            <span>Completed</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot pending"></span>
                            <span>Pending</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weekly Productivity -->
            <div class="chart-card" style="margin-top: var(--spacing-lg);">
                <div class="chart-card-header">
                    <h3 class="chart-card-title">Weekly Productivity</h3>
                </div>
                <div class="chart-container">
                    <canvas id="weeklyChart" width="400" height="200"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
