<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro — AXION</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        /* Pomodoro Page Specific Styles */
        .pomodoro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 180px);
            gap: var(--spacing-xl);
        }

        .timer-display {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-circle {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--border-subtle);
            stroke-width: 8;
        }

        .timer-circle-progress {
            fill: none;
            stroke: url(#timerGradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 880;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-circle-progress.focus {
            stroke: url(#focusGradient);
        }

        .timer-circle-progress.short-break {
            stroke: url(#shortBreakGradient);
        }

        .timer-circle-progress.long-break {
            stroke: url(#longBreakGradient);
        }

        .timer-time {
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-primary);
            z-index: 1;
            font-variant-numeric: tabular-nums;
        }

        .timer-mode {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .timer-controls {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .timer-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }

        .timer-btn-play {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--gradient-orange), var(--gradient-pink));
            color: white;
            box-shadow: 0 8px 30px rgba(247, 37, 133, 0.4);
        }

        .timer-btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(247, 37, 133, 0.6);
        }

        .timer-btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
        }

        .timer-btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--gradient-pink);
        }

        .mode-selector {
            display: flex;
            gap: var(--spacing-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xs);
        }

        .mode-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-family);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .mode-btn:hover {
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--gradient-orange), var(--gradient-pink));
            color: white;
        }

        /* Session Info */
        .session-info {
            display: flex;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-lg);
        }

        .session-stat {
            text-align: center;
        }

        .session-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .session-stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Task Selector */
        .task-selector {
            width: 100%;
            max-width: 400px;
            margin-top: var(--spacing-lg);
        }

        .task-selector-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
            text-align: center;
        }

        .task-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
        }

        .task-select:focus {
            border-color: var(--gradient-pink);
        }

        .task-select option {
            background: var(--bg-secondary);
        }

        /* Stats Card */
        .stats-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-xl);
            width: 100%;
            max-width: 600px;
        }

        .stats-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }

        .stat-item {
            text-align: center;
            padding: var(--spacing-md);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .stat-item-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gradient-pink);
        }

        .stat-item-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Sound Toggle */
        .sound-toggle {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-lg);
        }

        .sound-toggle label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .timer-display {
                width: 250px;
                height: 250px;
            }

            .timer-time {
                font-size: 3rem;
            }

            .timer-btn-play {
                width: 70px;
                height: 70px;
            }

            .mode-selector {
                flex-wrap: wrap;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">AXION</a>
            <button class="collapse-btn" aria-label="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="tasks.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span>Tasks</span>
            </a>
            <a href="calendar.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendar</span>
            </a>
            <a href="pomodoro.html" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Pomodoro</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar">DU</div>
                <div class="user-info">
                    <div class="user-name">Demo User</div>
                    <div class="user-email">demo@axion.app</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">Pomodoro Timer</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="logoutBtn" aria-label="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Pomodoro Content -->
        <div class="dashboard-content">
            <div class="pomodoro-container">
                <!-- Mode Selector -->
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="focus">Focus</button>
                    <button class="mode-btn" data-mode="short-break">Short Break</button>
                    <button class="mode-btn" data-mode="long-break">Long Break</button>
                </div>

                <!-- Timer Display -->
                <div class="timer-display">
                    <div class="timer-circle">
                        <svg viewBox="0 0 300 300">
                            <defs>
                                <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#ff6b35"/>
                                    <stop offset="100%" style="stop-color:#f72585"/>
                                </linearGradient>
                                <linearGradient id="focusGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#ff6b35"/>
                                    <stop offset="100%" style="stop-color:#f72585"/>
                                </linearGradient>
                                <linearGradient id="shortBreakGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#4cc9f0"/>
                                    <stop offset="100%" style="stop-color:#3a0ca3"/>
                                </linearGradient>
                                <linearGradient id="longBreakGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#7209b7"/>
                                    <stop offset="100%" style="stop-color:#3a0ca3"/>
                                </linearGradient>
                            </defs>
                            <circle class="timer-circle-bg" cx="150" cy="150" r="140"/>
                            <circle class="timer-circle-progress focus" id="timerProgress" cx="150" cy="150" r="140"/>
                        </svg>
                    </div>
                    <div class="timer-time" id="timerTime">25:00</div>
                </div>

                <!-- Timer Controls -->
                <div class="timer-controls">
                    <button class="timer-btn timer-btn-secondary" id="resetBtn" title="Reset">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                    <button class="timer-btn timer-btn-play" id="playBtn" title="Start/Pause">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <button class="timer-btn timer-btn-secondary" id="skipBtn" title="Skip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                </div>

                <!-- Session Info -->
                <div class="session-info">
                    <div class="session-stat">
                        <div class="session-stat-value" id="sessionCount">0</div>
                        <div class="session-stat-label">Sessions</div>
                    </div>
                    <div class="session-stat">
                        <div class="session-stat-value" id="totalMinutes">0</div>
                        <div class="session-stat-label">Minutes</div>
                    </div>
                    <div class="session-stat">
                        <div class="session-stat-value" id="streakCount">0</div>
                        <div class="session-stat-label">Streak</div>
                    </div>
                </div>

                <!-- Task Selector -->
                <div class="task-selector">
                    <div class="task-selector-label">Working on:</div>
                    <select class="task-select" id="taskSelect">
                        <option value="">Select a task...</option>
                    </select>
                </div>

                <!-- Sound Toggle -->
                <div class="sound-toggle">
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <label>Sound Effects</label>
                </div>

                <!-- Stats Card -->
                <div class="stats-card">
                    <div class="stats-title">Today's Progress</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-item-value" id="todaySessions">0</div>
                            <div class="stat-item-label">Sessions</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-item-value" id="todayMinutes">0</div>
                            <div class="stat-item-label">Minutes</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-item-value" id="todayTasks">0</div>
                            <div class="stat-item-label">Tasks Done</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/pomodoro.js"></script>
</body>
</html>
