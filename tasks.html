<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks — AXION</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        /* Task Page Specific Styles */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }
        
        .tasks-filters {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: var(--font-family);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        
        .filter-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, var(--gradient-orange), var(--gradient-pink));
            border-color: transparent;
            color: white;
        }
        
        .search-tasks {
            padding: 0.625rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition-fast);
            width: 250px;
        }
        
        .search-tasks:focus {
            border-color: var(--gradient-pink);
            box-shadow: 0 0 0 3px rgba(247, 37, 133, 0.1);
        }
        
        .search-tasks::placeholder {
            color: var(--text-muted);
        }
        
        /* Task Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-medium);
        }
        
        .modal.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(20px);
            transition: var(--transition-medium);
        }
        
        .modal.show .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
        }
        
        .close-modal {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        
        .close-modal:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        
        .task-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .task-form .form-group {
            margin-bottom: 0;
        }
        
        .task-form label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .task-form input,
        .task-form textarea,
        .task-form select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-fast);
        }
        
        .task-form input:focus,
        .task-form textarea:focus,
        .task-form select:focus {
            border-color: var(--gradient-pink);
            box-shadow: 0 0 0 3px rgba(247, 37, 133, 0.1);
        }
        
        .task-form textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .task-form select {
            cursor: pointer;
        }
        
        .task-form select option {
            background: var(--bg-secondary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        .form-actions {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-top: var(--spacing-md);
        }
        
        .btn-cancel {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
        }
        
        /* Task Category */
        .task-category {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: var(--spacing-xs);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .tasks-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-tasks {
                width: 100%;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">AXION</a>
            <button class="collapse-btn" aria-label="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="tasks.html" class="nav-item active">
                <i class="fas fa-check-square"></i>
                <span>Tasks</span>
            </a>
            <a href="calendar.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendar</span>
            </a>
            <a href="pomodoro.html" class="nav-item">
                <i class="fas fa-clock"></i>
                <span>Pomodoro</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar">DU</div>
                <div class="user-info">
                    <div class="user-name">Demo User</div>
                    <div class="user-email">demo@axion.app</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">Tasks</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn add-task-btn" aria-label="Add Task">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="topbar-btn" id="logoutBtn" aria-label="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Tasks Content -->
        <div class="dashboard-content">
            <!-- Tasks Header -->
            <div class="tasks-header">
                <div class="tasks-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <input type="text" class="search-tasks" placeholder="Search tasks...">
            </div>

            <!-- Stats Row -->
            <div class="stats-grid" style="margin-bottom: var(--spacing-lg);">
                <div class="stat-card stat-today">
                    <div class="stat-icon orange">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-card stat-completed">
                    <div class="stat-icon pink">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card stat-pending">
                    <div class="stat-icon purple">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card stat-productivity">
                    <div class="stat-icon cyan">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    </div>
                    <div class="progress-ring-container">
                        <div class="progress-ring" style="width: 60px; height: 60px;">
                            <svg width="60" height="60" viewBox="0 0 60 60">
                                <circle class="bg" cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                                <circle class="progress" cx="30" cy="30" r="24" fill="none" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
                                <defs>
                                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" style="stop-color:#ff6b35"/>
                                        <stop offset="100%" style="stop-color:#f72585"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <span class="progress-value" style="font-size: 0.9rem;">0%</span>
                        </div>
                    </div>
                    <div class="stat-label">Productivity</div>
                </div>
            </div>

            <!-- Task List -->
            <div class="glass-card">
                <div class="task-list" id="taskList">
                    <!-- Tasks will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-modal" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Health">Health</option>
                            <option value="Learning">Learning</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" name="dueDate">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
